<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آموزش‌یار</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Tahoma;background:#f0f4ff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .box{background:white;border-radius:30px;padding:40px;max-width:500px;width:100%;box-shadow:0 20px 40px rgba(0,0,0,0.1);text-align:center}
        h1{color:#3b82f6;font-size:2rem}
        input{width:100%;padding:12px;margin:10px 0;border-radius:40px;border:2px solid #cbd5e1;font-size:1rem}
        button{width:100%;padding:12px;background:#3b82f6;color:white;border:none;border-radius:40px;font-size:1.1rem;font-weight:700;cursor:pointer}
        button:hover{background:#2563eb}
        .msg{color:#dc2626;margin-top:10px;display:none}
        .count{margin-top:16px;color:#64748b}
        .count strong{color:#3b82f6}
        .user-info{background:#f8fafc;padding:16px;border-radius:20px;margin-top:16px;display:none}
        .logout{background:#ef4444;margin-top:10px}
        .logout:hover{background:#dc2626}
    </style>
</head>
<body>
<div class="box">
    <h1>🧠 آموزش‌یار</h1>
    <p style="color:#64748b;margin-bottom:16px;">ثبت‌نام و ورود</p>

    <input type="text" id="name" placeholder="نام">
    <input type="text" id="family" placeholder="نام‌خانوادگی">
    <input type="number" id="age" placeholder="سن" min="4" max="99">

    <button id="registerBtn">🚀 ثبت‌نام</button>
    <div class="msg" id="msg"></div>

    <div class="user-info" id="userInfo">
        <p id="greeting" style="font-weight:700;color:#1e293b;"></p>
        <button class="logout" id="logoutBtn">🚪 خروج</button>
    </div>

    <div class="count">👥 کاربران: <strong id="count">۰</strong></div>
</div>

<script>
    const USERS_KEY = 'myUsers';
    const CURRENT_KEY = 'myCurrentUser';

    function getUsers() {
        try { return JSON.parse(localStorage.getItem(USERS_KEY) || '[]'); } catch { return []; }
    }
    function saveUsers(u) { localStorage.setItem(USERS_KEY, JSON.stringify(u)); }
    function getCurrent() {
        try { return JSON.parse(localStorage.getItem(CURRENT_KEY)); } catch { return null; }
    }
    function setCurrent(u) { localStorage.setItem(CURRENT_KEY, JSON.stringify(u)); }
    function clearCurrent() { localStorage.removeItem(CURRENT_KEY); }

    function updateUI() {
        const user = getCurrent();
        const count = getUsers().length;
        document.getElementById('count').textContent = count;

        if (user) {
            document.querySelector('h1').textContent = '🧠 آموزش‌یار';
            document.getElementById('userInfo').style.display = 'block';
            document.getElementById('greeting').textContent = '👋 ' + user.name + ' ' + user.family + ' (' + user.age + ' سال)';
            document.getElementById('name').style.display = 'none';
            document.getElementById('family').style.display = 'none';
            document.getElementById('age').style.display = 'none';
            document.getElementById('registerBtn').style.display = 'none';
            document.getElementById('msg').style.display = 'none';
        } else {
            document.getElementById('userInfo').style.display = 'none';
            document.getElementById('name').style.display = 'block';
            document.getElementById('family').style.display = 'block';
            document.getElementById('age').style.display = 'block';
            document.getElementById('registerBtn').style.display = 'block';
        }
    }

    document.getElementById('registerBtn').addEventListener('click', function() {
        const name = document.getElementById('name').value.trim();
        const family = document.getElementById('family').value.trim();
        const age = document.getElementById('age').value.trim();
        const msg = document.getElementById('msg');

        if (!name || !family || !age) {
            msg.textContent = '❌ همه فیلدها را پر کنید.';
            msg.style.display = 'block';
            msg.style.color = '#dc2626';
            return;
        }
        const a = parseInt(age);
        if (isNaN(a) || a < 4 || a > 99) {
            msg.textContent = '❌ سن باید بین ۴ تا ۹۹ باشد.';
            msg.style.display = 'block';
            msg.style.color = '#dc2626';
            return;
        }

        const users = getUsers();
        const newUser = { id: Date.now(), name, family, age: a };
        users.push(newUser);
        saveUsers(users);
        setCurrent(newUser);

        msg.textContent = '✅ ثبت‌نام موفق!';
        msg.style.display = 'block';
        msg.style.color = '#16a34a';

        setTimeout(updateUI, 500);
    });

    document.getElementById('logoutBtn').addEventListener('click', function() {
        clearCurrent();
        updateUI();
    });

    updateUI();
    console.log('✅ سایت با موفقیت بارگذاری شد!');
    console.log('👥 تعداد کاربران:', getUsers().length);
</script>
</body>
</html>
