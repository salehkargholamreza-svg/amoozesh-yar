<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>آموزش‌یار | نسخه ساده</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f4ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        /* ثبت‌نام */
        #registerPage {
            text-align: center;
            padding: 40px 20px;
        }
        #registerPage.hidden { display: none; }
        .register-box {
            max-width: 400px;
            margin: 0 auto;
            background: #f8fafc;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
        }
        .register-box h2 { font-size: 1.8rem; margin-bottom: 8px; }
        .register-box input {
            width: 100%;
            padding: 10px 16px;
            margin-top: 12px;
            border-radius: 40px;
            border: 2px solid #cbd5e1;
            font-size: 1rem;
        }
        .register-box input:focus { outline: none; border-color: #3b82f6; }
        .register-box button {
            width: 100%;
            margin-top: 16px;
            padding: 12px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
        }
        .register-box button:hover { background: #2563eb; }
        .error-msg { color: #dc2626; margin-top: 10px; display: none; }
        .success-msg { color: #16a34a; margin-top: 10px; display: none; }
        .user-count { margin-top: 16px; padding-top: 16px; border-top: 1px dashed #e2e8f0; color: #64748b; }
        .user-count strong { color: #3b82f6; }

        /* سایت اصلی */
        #mainSite { display: none; }
        #mainSite.active { display: block; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            padding-bottom: 16px;
            border-bottom: 2px dashed #cbd5e1;
            margin-bottom: 20px;
        }
        .logo { font-size: 1.8rem; font-weight: 800; color: #1e293b; }
        .logo span { color: #3b82f6; }
        .header-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .header-actions .greeting { font-weight: 600; }
        .header-actions .count { background: #e2e8f0; padding: 4px 14px; border-radius: 40px; font-size: 0.85rem; }
        .btn-logout { background: #ef4444; color: white; border: none; padding: 6px 16px; border-radius: 40px; cursor: pointer; }
        .btn-logout:hover { background: #dc2626; }

        .nav-menu {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 20px;
            background: #f1f5f9;
            padding: 8px;
            border-radius: 50px;
        }
        .nav-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 40px;
            background: transparent;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .nav-btn:hover { background: rgba(59,130,246,0.1); }
        .nav-btn.active { background: #3b82f6; color: white; }

        .page { display: none; padding: 10px 0; }
        .page.active { display: block; }
        .page h2 { font-size: 1.6rem; margin-bottom: 8px; }
        .page p { color: #64748b; margin-bottom: 16px; }

        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 16px;
        }
        .course-card {
            background: #f8fafc;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #e2e8f0;
            transition: 0.3s;
        }
        .course-card:hover { transform: translateY(-4px); box-shadow: 0 8px 16px rgba(0,0,0,0.05); }
        .course-card .icon { font-size: 2rem; display: block; }
        .course-card .title { font-weight: 700; font-size: 1.05rem; }
        .course-card .desc { font-size: 0.85rem; color: #64748b; margin: 4px 0 8px; }
        .course-card .level {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 2px 12px;
            border-radius: 40px;
            display: inline-block;
            background: #dbeafe;
            color: #1e40af;
        }
        .course-card .btn-start {
            margin-top: 10px;
            padding: 6px;
            border: none;
            border-radius: 40px;
            background: #22c55e;
            color: white;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        .course-card .btn-start:hover { background: #16a34a; }
        .course-card .btn-start:disabled { background: #94a3b8; cursor: not-allowed; }
        .course-card .lock { color: #94a3b8; font-size: 0.8rem; }

        /* مدیریت */
        .admin-panel { background: #f8fafc; border-radius: 16px; padding: 20px; border: 1px solid #e2e8f0; }
        .admin-panel table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .admin-panel th, .admin-panel td { padding: 8px 10px; border-bottom: 1px solid #e2e8f0; text-align: center; }
        .admin-panel th { background: #eef2f6; }
        .admin-panel .delete-btn { background: #ef4444; color: white; border: none; padding: 2px 12px; border-radius: 40px; cursor: pointer; }
        .admin-panel .clear-btn { background: #dc2626; color: white; border: none; padding: 6px 18px; border-radius: 40px; cursor: pointer; font-weight: 600; margin: 8px 0; }
        .admin-lock { text-align: center; padding: 30px; background: #f8fafc; border-radius: 16px; }
        .admin-lock input { padding: 8px 16px; border-radius: 40px; border: 2px solid #cbd5e1; width: 200px; }
        .admin-lock button { padding: 8px 20px; border: none; border-radius: 40px; background: #3b82f6; color: white; font-weight: 600; cursor: pointer; }
        .admin-lock .error { color: #dc2626; display: none; margin-top: 8px; }

        .project-form { background: #f8fafc; border-radius: 16px; padding: 20px; border: 1px solid #e2e8f0; }
        .project-form label { display: block; font-weight: 600; margin-top: 12px; }
        .project-form input, .project-form textarea, .project-form select {
            width: 100%;
            padding: 8px 14px;
            border-radius: 40px;
            border: 2px solid #cbd5e1;
            font-size: 0.95rem;
            margin-top: 4px;
        }
        .project-form textarea { border-radius: 16px; min-height: 60px; }
        .project-form .btn-submit { margin-top: 12px; padding: 8px 24px; background: #22c55e; color: white; border: none; border-radius: 40px; font-weight: 700; cursor: pointer; }
        .project-form .btn-submit:hover { background: #16a34a; }

        .project-item { padding: 10px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; flex-wrap: wrap; }
        .project-item:last-child { border-bottom: none; }

        .footer { text-align: center; margin-top: 20px; padding-top: 16px; border-top: 1px solid #e2e8f0; color: #64748b; font-size: 0.85rem; }

        .live-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

        @media (max-width: 600px) {
            .container { padding: 16px; border-radius: 20px; }
            .header { flex-direction: column; gap: 10px; }
            .nav-menu { border-radius: 30px; gap: 4px; }
            .nav-btn { padding: 6px 10px; font-size: 0.75rem; }
            .course-grid { grid-template-columns: 1fr; }
            .register-box { padding: 20px; }
            .admin-panel table { font-size: 0.7rem; }
            .admin-panel th, .admin-panel td { padding: 4px 6px; }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- ===== ثبت‌نام ===== -->
    <div id="registerPage">
        <div class="register-box">
            <h2>🧑‍🎓 ثبت‌نام</h2>
            <p style="color:#64748b;margin-bottom:12px;">برای دسترسی به دوره‌ها ثبت‌نام کنید</p>

            <input type="text" id="regName" placeholder="نام" />
            <input type="text" id="regFamily" placeholder="نام‌خانوادگی" />
            <input type="number" id="regAge" placeholder="سن" min="4" max="99" />

            <button id="registerBtn">🚀 ثبت‌نام</button>
            <div class="error-msg" id="registerError">❌ همه فیلدها را پر کنید.</div>
            <div class="success-msg" id="registerSuccess">✅ ثبت‌نام شد!</div>

            <div class="user-count">👥 کاربران: <strong id="userCountDisplay">۰</strong></div>
        </div>
    </div>

    <!-- ===== سایت اصلی ===== -->
    <div id="mainSite">

        <div class="header">
            <div class="logo">🧠 <span>آموزش‌یار</span></div>
            <div class="header-actions">
                <span class="greeting" id="userGreeting"></span>
                <span class="count">👥 <span id="headerUserCount">۰</span> <span class="live-dot"></span></span>
                <button class="btn-logout" id="logoutBtn">🚪 خروج</button>
            </div>
        </div>

        <div class="nav-menu" id="navMenu">
            <button class="nav-btn active" data-page="courses">📚 دوره‌ها</button>
            <button class="nav-btn" data-page="project">📤 پروژه</button>
            <button class="nav-btn" data-page="admin">⚙️ مدیریت</button>
        </div>

        <div class="main-content">

            <!-- دوره‌ها -->
            <div class="page active" id="page-courses">
                <h2>📚 دوره‌ها</h2>
                <p>دوره‌های مناسب سن شما</p>
                <div class="course-grid" id="courseGrid"></div>
            </div>

            <!-- پروژه -->
            <div class="page" id="page-project">
                <h2>📤 ارسال پروژه</h2>
                <p>پروژه خود را برای رئیسی ارسال کنید</p>

                <div class="project-form">
                    <label>عنوان</label>
                    <input type="text" id="projectTitle" placeholder="عنوان پروژه" />

                    <label>دوره</label>
                    <select id="projectCourse">
                        <option value="scratch">اسکرچ</option>
                        <option value="junior">جونیور</option>
                        <option value="python">پایتون</option>
                        <option value="web">وب‌سازی</option>
                    </select>

                    <label>توضیحات</label>
                    <textarea id="projectDesc" placeholder="توضیحات پروژه..."></textarea>

                    <button class="btn-submit" id="sendProjectBtn">📤 ارسال</button>
                </div>

                <div style="margin-top:16px;">
                    <h3>📋 پروژه‌های من</h3>
                    <div id="projectList"></div>
                </div>
            </div>

            <!-- مدیریت -->
            <div class="page" id="page-admin">
                <h2>⚙️ مدیریت</h2>
                <p>مدیریت کاربران و پروژه‌ها</p>
                <div id="adminContent"></div>
            </div>

        </div>

        <div class="footer">
            <span>✨ ساخته شده برای آموزش</span>
            <span><a href="#" onclick="location.reload();">🔄 بروزرسانی</a></span>
        </div>
    </div>

</div>

<script>
    (function() {
        'use strict';

        // ===== کلیدها =====
        const USERS_KEY = 'amoozeshYarUsers';
        const CURRENT_KEY = 'amoozeshYarCurrentUser';
        const ADMIN_KEY = 'amoozeshYarAdmin';
        const PROJECTS_KEY = 'amoozeshYarProjects';

        // ===== دوره‌ها =====
        const COURSES = [
            { id: 'j1', title: 'آشنایی با جونیور', desc: 'معرفی محیط', icon: '🐱', minAge: 5, maxAge: 7 },
            { id: 'j2', title: 'حرکت و انیمیشن', desc: 'حرکت دادن شخصیت‌ها', icon: '🏃', minAge: 5, maxAge: 7 },
            { id: 's1', title: 'مقدمات اسکرچ', desc: 'آشنایی با محیط', icon: '🟦', minAge: 8, maxAge: 10 },
            { id: 's2', title: 'حرکت در اسکرچ', desc: 'کنترل حرکت', icon: '🧭', minAge: 8, maxAge: 10 },
            { id: 'p1', title: 'مقدمات پایتون', desc: 'اولین برنامه', icon: '🐍', minAge: 13, maxAge: 15 },
            { id: 'w1', title: 'مقدمات HTML', desc: 'ساختار صفحات', icon: '🌐', minAge: 16, maxAge: 18 }
        ];

        // ===== توابع =====
        function getUsers() {
            try { const d = localStorage.getItem(USERS_KEY); return d ? JSON.parse(d) : []; } catch { return []; }
        }

        function saveUsers(u) { localStorage.setItem(USERS_KEY, JSON.stringify(u)); }

        function getCurrent() {
            try { const d = localStorage.getItem(CURRENT_KEY); return d ? JSON.parse(d) : null; } catch { return null; }
        }

        function setCurrent(u) { localStorage.setItem(CURRENT_KEY, JSON.stringify(u)); }

        function clearCurrent() { localStorage.removeItem(CURRENT_KEY); }

        function isAdmin() { return localStorage.getItem(ADMIN_KEY) === 'true'; }

        function setAdmin(s) { localStorage.setItem(ADMIN_KEY, String(s)); }

        function getProjects() {
            try { const d = localStorage.getItem(PROJECTS_KEY); return d ? JSON.parse(d) : []; } catch { return []; }
        }

        function saveProjects(p) { localStorage.setItem(PROJECTS_KEY, JSON.stringify(p)); }

        function getLevel(age) {
            const a = parseInt(age);
            if (a >= 5 && a <= 7) return 'مبتدی';
            if (a >= 8 && a <= 12) return 'متوسط';
            if (a >= 13 && a <= 15) return 'پیشرفته';
            if (a >= 16 && a <= 18) return 'حرفه‌ای';
            return 'همه';
        }

        function updateCount() {
            const u = getUsers();
            const c = u.length;
            const e1 = document.getElementById('userCountDisplay');
            if (e1) e1.textContent = c;
            const e2 = document.getElementById('headerUserCount');
            if (e2) e2.textContent = c;
        }

        // ===== رندر دوره‌ها =====
        function renderCourses() {
            const container = document.getElementById('courseGrid');
            if (!container) return;
            const user = getCurrent();
            const age = user ? parseInt(user.age) : 0;

            let html = '';
            COURSES.forEach(c => {
                const locked = age < c.minAge;
                html += `
                    <div class="course-card">
                        <span class="icon">${c.icon}</span>
                        <div class="title">${c.title}</div>
                        <div class="desc">${c.desc}</div>
                        <span class="level">${c.minAge}-${c.maxAge} سال</span>
                        ${locked ? '<div class="lock">🔒 نیاز به سن ' + c.minAge + '</div>' : ''}
                        <button class="btn-start" ${locked ? 'disabled' : ''} data-title="${c.title}">
                            ${locked ? '🔒 قفل' : '📖 شروع'}
                        </button>
                    </div>
                `;
            });
            container.innerHTML = html;

            container.querySelectorAll('.btn-start:not([disabled])').forEach(btn => {
                btn.addEventListener('click', function() {
                    alert('🎉 دوره "' + this.dataset.title + '" شروع شد!');
                });
            });
        }

        // ===== رندر پروژه‌ها =====
        function renderProjects() {
            const container = document.getElementById('projectList');
            if (!container) return;
            const user = getCurrent();
            const projects = getProjects();
            const userProjects = projects.filter(p => p.userId === (user ? user.id : null));

            if (userProjects.length === 0) {
                container.innerHTML = '<p style="color:#94a3b8;">هیچ پروژه‌ای ارسال نشده.</p>';
                return;
            }

            let html = '';
            userProjects.forEach(p => {
                const status = p.status || 'در انتظار';
                const color = status === 'تأیید شده' ? '#16a34a' : status === 'رد شده' ? '#dc2626' : '#f59e0b';
                html += `
                    <div class="project-item">
                        <div><strong>${p.title}</strong> - ${p.course}</div>
                        <div style="color:${color};font-weight:600;">${status}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // ===== مدیریت =====
        function renderAdmin() {
            const container = document.getElementById('adminContent');
            if (!container) return;

            if (!isAdmin()) {
                container.innerHTML = `
                    <div class="admin-lock">
                        <div style="font-size:3rem;">🔐</div>
                        <h3>ورود به مدیریت</h3>
                        <input type="password" id="adminPass" placeholder="رمز..." />
                        <button id="adminLoginBtn">✔️ ورود</button>
                        <div class="error" id="adminError">❌ رمز اشتباه</div>
                    </div>
                `;
                const input = document.getElementById('adminPass');
                const btn = document.getElementById('adminLoginBtn');
                const err = document.getElementById('adminError');

                function login() {
                    if (input.value.trim() === 'admin123') {
                        setAdmin(true);
                        renderAdmin();
                    } else {
                        err.style.display = 'block';
                        input.value = '';
                        input.focus();
                    }
                }
                btn.addEventListener('click', login);
                input.addEventListener('keydown', function(e) { if (e.key === 'Enter') login(); });
                return;
            }

            const users = getUsers();
            const projects = getProjects();

            let html = `
                <div class="admin-panel">
                    <h3>📊 آمار</h3>
                    <p>👥 کاربران: ${users.length} | 📤 پروژه‌ها: ${projects.length}</p>
                    <button class="clear-btn" id="clearAllBtn">🗑️ حذف همه کاربران</button>

                    <h3 style="margin-top:16px;">👥 کاربران</h3>
                    <div style="overflow-x:auto;">
                        <table>
                            <thead><tr><th>#</th><th>نام</th><th>خانوادگی</th><th>سن</th><th>سطح</th><th>عملیات</th></tr></thead>
                            <tbody id="usersTable"></tbody>
                        </table>
                    </div>

                    <h3 style="margin-top:16px;">📤 پروژه‌ها</h3>
                    <div style="overflow-x:auto;">
                        <table>
                            <thead><tr><th>#</th><th>کاربر</th><th>عنوان</th><th>دوره</th><th>وضعیت</th><th>عملیات</th></tr></thead>
                            <tbody id="adminProjectsTable"></tbody>
                        </table>
                    </div>

                    <button class="clear-btn" style="background:#64748b;margin-top:12px;" id="adminLogout">🚪 خروج</button>
                </div>
            `;
            container.innerHTML = html;

            // کاربران
            const userBody = document.getElementById('usersTable');
            if (userBody) {
                if (users.length === 0) {
                    userBody.innerHTML = '<tr><td colspan="6">هیچ کاربری نیست</td></tr>';
                } else {
                    let rows = '';
                    users.forEach((u, i) => {
                        rows += `
                            <tr>
                                <td>${i+1}</td>
                                <td>${u.name}</td>
                                <td>${u.family}</td>
                                <td>${u.age}</td>
                                <td>${getLevel(u.age)}</td>
                                <td><button class="delete-btn" data-id="${u.id}">🗑️</button></td>
                            </tr>
                        `;
                    });
                    userBody.innerHTML = rows;

                    userBody.querySelectorAll('.delete-btn').forEach(btn => {
                        btn.addEventListener('click', function() {
                            const id = parseInt(this.dataset.id);
                            if (confirm('حذف کاربر؟')) {
                                let list = getUsers();
                                list = list.filter(u => u.id !== id);
                                saveUsers(list);
                                const current = getCurrent();
                                if (current && current.id === id) { clearCurrent();
                                    location.reload(); } else { renderAdmin();
                                    updateCount(); }
                            }
                        });
                    });
                }
            }

            // پروژه‌ها
            const projBody = document.getElementById('adminProjectsTable');
            if (projBody) {
                if (projects.length === 0) {
                    projBody.innerHTML = '<tr><td colspan="6">هیچ پروژه‌ای نیست</td></tr>';
                } else {
                    let rows = '';
                    projects.forEach((p, i) => {
                        const user = users.find(u => u.id === p.userId);
                        const userName = user ? user.name + ' ' + user.family : 'نامشخص';
                        rows += `
                            <tr>
                                <td>${i+1}</td>
                                <td>${userName}</td>
                                <td>${p.title}</td>
                                <td>${p.course}</td>
                                <td>${p.status || 'در انتظار'}</td>
                                <td>
                                    <button class="delete-btn" data-project-id="${p.id}">🗑️</button>
                                    <button class="approve-btn" data-project-id="${p.id}" style="background:#22c55e;color:white;border:none;padding:2px 10px;border-radius:40px;cursor:pointer;">✅</button>
                                    <button class="reject-btn" data-project-id="${p.id}" style="background:#f59e0b;color:white;border:none;padding:2px 10px;border-radius:40px;cursor:pointer;">❌</button>
                                </td>
                            </tr>
                        `;
                    });
                    projBody.innerHTML = rows;

                    projBody.querySelectorAll('.delete-btn').forEach(btn => {
                        btn.addEventListener('click', function() {
                            const id = parseInt(this.dataset.projectId);
                            if (confirm('حذف پروژه؟')) {
                                let list = getProjects();
                                list = list.filter(p => p.id !== id);
                                saveProjects(list);
                                renderAdmin();
                                renderProjects();
                            }
                        });
                    });

                    projBody.querySelectorAll('.approve-btn').forEach(btn => {
                        btn.addEventListener('click', function() {
                            const id = parseInt(this.dataset.projectId);
                            let list = getProjects();
                            const p = list.find(proj => proj.id === id);
                            if (p) { p.status = 'تأیید شده';
                                saveProjects(list);
                                renderAdmin();
                                renderProjects(); }
                        });
                    });

                    projBody.querySelectorAll('.reject-btn').forEach(btn => {
                        btn.addEventListener('click', function() {
                            const id = parseInt(this.dataset.projectId);
                            let list = getProjects();
                            const p = list.find(proj => proj.id === id);
                            if (p) { p.status = 'رد شده';
                                saveProjects(list);
                                renderAdmin();
                                renderProjects(); }
                        });
                    });
                }
            }

            document.getElementById('clearAllBtn')?.addEventListener('click', function() {
                if (confirm('حذف همه کاربران؟')) {
                    if (confirm('تأیید نهایی')) {
                        localStorage.removeItem(USERS_KEY);
                        localStorage.removeItem(CURRENT_KEY);
                        renderAdmin();
                        updateCount();
                        alert('✅ همه حذف شدند.');
                    }
                }
            });

            document.getElementById('adminLogout')?.addEventListener('click', function() {
                setAdmin(false);
                renderAdmin();
            });
        }

        // ===== ثبت‌نام =====
        const registerPage = document.getElementById('registerPage');
        const mainSite = document.getElementById('mainSite');
        const registerBtn = document.getElementById('registerBtn');
        const regError = document.getElementById('registerError');
        const regSuccess = document.getElementById('registerSuccess');
        const userGreeting = document.getElementById('userGreeting');
        const logoutBtn = document.getElementById('logoutBtn');

        function checkLogin() {
            const user = getCurrent();
            if (user) {
                registerPage.classList.add('hidden');
                mainSite.classList.add('active');
                userGreeting.textContent = `👋 ${user.name} ${user.family} (${user.age} سال)`;
                renderCourses();
                renderProjects();
                renderAdmin();
                updateCount();
            } else {
                registerPage.classList.remove('hidden');
                mainSite.classList.remove('active');
                updateCount();
                regError.style.display = 'none';
                regSuccess.style.display = 'none';
            }
        }

        registerBtn.addEventListener('click', function() {
            const name = document.getElementById('regName').value.trim();
            const family = document.getElementById('regFamily').value.trim();
            const age = document.getElementById('regAge').value.trim();

            if (!name || !family || !age) {
                regError.style.display = 'block';
                regSuccess.style.display = 'none';
                return;
            }
            const a = parseInt(age);
            if (isNaN(a) || a < 4 || a > 99) {
                regError.style.display = 'block';
                regSuccess.style.display = 'none';
                return;
            }
            regError.style.display = 'none';

            const users = getUsers();
            const newUser = { id: Date.now(), name, family, age: a, registerDate: new Date().toISOString() };
            users.push(newUser);
            saveUsers(users);
            setCurrent(newUser);

            regSuccess.style.display = 'block';
            setTimeout(checkLogin, 500);
        });

        logoutBtn.addEventListener('click', function() {
            clearCurrent();
            setAdmin(false);
            checkLogin();
        });

        // ===== ارسال پروژه =====
        document.getElementById('sendProjectBtn')?.addEventListener('click', function() {
            const user = getCurrent();
            if (!user) { alert('⚠️ لطفاً وارد شوید.'); return; }

            const title = document.getElementById('projectTitle').value.trim();
            const course = document.getElementById('projectCourse').value;
            const desc = document.getElementById('projectDesc').value.trim();

            if (!title || !desc) { alert('❌ عنوان و توضیحات را پر کنید.'); return; }

            const projects = getProjects();
            const courseNames = { scratch: 'اسکرچ', junior: 'جونیور', python: 'پایتون', web: 'وب‌سازی' };
            projects.push({
                id: Date.now(),
                userId: user.id,
                title,
                course: courseNames[course] || course,
                desc,
                date: new Date().toISOString(),
                status: 'در انتظار بررسی'
            });
            saveProjects(projects);

            alert('✅ پروژه ارسال شد!');
            document.getElementById('projectTitle').value = '';
            document.getElementById('projectDesc').value = '';
            renderProjects();
            renderAdmin();
        });

        // ===== منو =====
        const navBtns = document.querySelectorAll('.nav-btn');
        const pages = {
            courses: document.getElementById('page-courses'),
            project: document.getElementById('page-project'),
            admin: document.getElementById('page-admin')
        };

        navBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                navBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                const id = this.dataset.page;
                Object.values(pages).forEach(p => p.classList.remove('active'));
                if (pages[id]) {
                    pages[id].classList.add('active');
                    if (id === 'admin') renderAdmin();
                    if (id === 'project') renderProjects();
                }
            });
        });

        // ===== شروع =====
        checkLogin();
        console.log('✅ آموزش‌یار ساده بارگذاری شد!');
        console.log('👥 کاربران:', getUsers().length);
        console.log('🔑 رمز مدیریت: admin123');
    })();
</script>

</body>
</html>
